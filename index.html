<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Optimizer - Trifecta Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #09090b;
            --bg-panel: rgba(24, 24, 27, 0.6);
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --border-focus: rgba(96, 165, 250, 0.5);
            
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --accent-primary: #3b82f6;
            --accent-primary-hover: #2563eb;
            --accent-export: #8b5cf6;
            --accent-export-hover: #7c3aed;
            
            --status-valid: #10b981;
            --status-valid-bg: rgba(16, 185, 129, 0.1);
            --status-invalid: #ef4444;
            --status-invalid-bg: rgba(239, 68, 68, 0.1);
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            
            --shadow-panel: 0 4px 24px -1px rgba(0, 0, 0, 0.5);
            
            --font-ui: 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: var(--font-ui); 
            background-color: var(--bg-base); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.03), transparent 25%);
            color: var(--text-main); 
            margin: 0; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header { 
            width: 100%; 
            max-width: 1600px; 
            margin-bottom: 24px; 
            text-align: left;
        }
        
        .header h1 { 
            font-size: 1.5rem; 
            font-weight: 700;
            margin: 0; 
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-layout,
        .bottom-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            width: 100%;
            align-items: stretch;
        }

        .panel { 
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border-subtle);
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            box-shadow: var(--shadow-panel);
            min-height: 100%;
        }

        .panel-title {
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        hr {
            width: 100%;
            border: none;
            height: 1px;
            background: var(--border-subtle);
            margin: 0;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .num-input { 
            background: var(--bg-surface); 
            color: var(--text-main); 
            border: 1px solid var(--border-subtle); 
            padding: 6px 8px; 
            border-radius: var(--radius-sm); 
            font-family: var(--font-mono); 
            font-size: 0.85rem; 
            outline: none; 
            width: 50px;
            transition: all 0.2s;
            text-align: center;
        }
        .num-input:focus { 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 0 2px var(--border-focus);
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            background: rgba(0, 0, 0, 0.4); 
            color: var(--status-valid); 
            font-family: var(--font-mono); 
            border: 1px solid var(--border-subtle); 
            padding: 12px; 
            border-radius: var(--radius-sm); 
            resize: vertical; 
            font-size: 0.8rem;
            line-height: 1.5;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus { border-color: var(--accent-primary); }

        .stretch-textarea {
            flex: 1;
            min-height: 260px;
            height: auto;
        }

        .toggles { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: var(--bg-surface); 
            padding: 16px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-subtle); 
        }
        
        .toggle-row { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 500; 
            font-size: 0.85rem; 
            cursor: pointer; 
            color: var(--text-main);
            user-select: none;
        }
        .toggle-row input[type="checkbox"] { 
            appearance: none;
            width: 36px;
            height: 20px;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .toggle-row input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .toggle-row input[type="checkbox"]:checked {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .toggle-row input[type="checkbox"]:checked::after {
            transform: translateX(16px);
            background: #fff;
        }

        .btn-load, .btn-export { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white; 
            padding: 10px 16px; 
            border: none; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            font-weight: 600; 
            font-family: var(--font-ui);
            transition: all 0.2s; 
            width: 100%; 
            font-size: 0.85rem; 
            flex-shrink: 0;
        }
        .btn-load { background: var(--accent-primary); }
        .btn-load:hover { background: var(--accent-primary-hover); }
        
        .btn-export { background: var(--accent-export); }
        .btn-export:hover { background: var(--accent-export-hover); }

        .tool-btn { 
            padding: 8px 12px; 
            border: 1px solid var(--border-subtle); 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            font-weight: 500; 
            background: var(--bg-base); 
            color: var(--text-main); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.8rem;
            font-family: var(--font-ui);
        }
        .tool-btn:hover { 
            background: var(--bg-surface-hover); 
            border-color: var(--border-strong);
        }
        .tool-btn.active { 
            background: var(--text-main);
            color: var(--bg-base);
            border-color: var(--text-main); 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        
        .action-btn.active { background: var(--status-valid); border-color: var(--status-valid); color: #fff; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .delete-btn.active { background: var(--status-invalid); border-color: var(--status-invalid); color: #fff; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .info-btn.active { background: #06b6d4; border-color: #06b6d4; color: #fff; box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2); }

        .utils-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
        }

        .utils-grid .tool-btn {
            justify-content: center;
        }

        .legend-panel { 
            background: var(--bg-surface); 
            padding: 16px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-subtle); 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 10px; 
            font-size: 0.75rem;
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            padding: 6px; 
            border-radius: var(--radius-sm); 
            transition: background 0.2s; 
            color: var(--text-muted);
        }
        .legend-item:hover { 
            background: var(--bg-surface-hover); 
            color: var(--text-main);
        }
        .legend-item b { color: var(--text-main); }

        .color-swatch { 
            width: 14px; 
            height: 14px; 
            border-radius: 4px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .score-board { 
            background: var(--bg-surface); 
            padding: 16px; 
            border-radius: var(--radius-md); 
            font-size: 0.9rem; 
            font-weight: 600; 
            border: 1px solid var(--border-subtle); 
            transition: all 0.3s; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .score-board #score {
            font-family: var(--font-mono);
            font-size: 1.25rem;
        }
        .score-board.invalid { 
            background: var(--status-invalid-bg); 
            color: var(--status-invalid); 
            border-color: rgba(239, 68, 68, 0.3); 
        }
        .score-board.valid { 
            background: var(--status-valid-bg); 
            color: var(--status-valid); 
            border-color: rgba(16, 185, 129, 0.3); 
        }

        .center-workspace {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-panel);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        .error-box { 
            min-height: 24px; 
            font-weight: 600; 
            text-align: center; 
            width: 100%; 
            font-size: 0.9rem;
            opacity: 1;
            transition: opacity 0.2s;
        }
        .error-box:empty { opacity: 0; }

        #grid-container { 
            overflow: auto; 
            max-width: 100%; 
            padding: 24px; 
            border-radius: var(--radius-lg); 
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-panel);
            min-height: 420px;
        }
        
        #grid-container::-webkit-scrollbar { width: 8px; height: 8px; }
        #grid-container::-webkit-scrollbar-track { background: var(--bg-base); border-radius: 4px; }
        #grid-container::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
        #grid-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .grid { 
            display: grid; 
            border: 1px solid var(--border-strong); 
            background-color: var(--bg-base); 
            gap: 1px; 
            width: max-content; 
            border-radius: 2px;
            padding: 1px;
            margin: 0 auto;
        }
        
        .cell { 
            width: 20px; 
            height: 20px; 
            background-color: var(--bg-surface-hover); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 0.55rem; 
            font-family: var(--font-mono);
            font-weight: 700; 
            cursor: pointer; 
            user-select: none; 
            position: relative;
            transition: opacity 0.15s;
            border-radius: 2px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
        }
        .cell:hover { opacity: 0.8; }

        .buildings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            background: var(--bg-surface);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
        }

        @keyframes pulseError { 
            0% { box-shadow: inset 0 0 0 1px #ef4444, 0 0 4px rgba(239,68,68,0.4); z-index: 10; } 
            50% { box-shadow: inset 0 0 0 2px #ef4444, 0 0 12px rgba(239,68,68,0.8); z-index: 10; } 
            100% { box-shadow: inset 0 0 0 1px #ef4444, 0 0 4px rgba(239,68,68,0.4); z-index: 10; } 
        }
        .violation { animation: pulseError 1.5s infinite; }

        @keyframes pulseSynergy { 
            0% { box-shadow: inset 0 0 0 1px #10b981, 0 0 4px rgba(16,185,129,0.4); z-index: 9; } 
            50% { box-shadow: inset 0 0 0 2px #10b981, 0 0 12px rgba(16,185,129,0.8); z-index: 9; } 
            100% { box-shadow: inset 0 0 0 1px #10b981, 0 0 4px rgba(16,185,129,0.4); z-index: 9; } 
        }
        .synergy-active { animation: pulseSynergy 2s infinite; }

        #info-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(4px);
            z-index: 99; 
        }
        
        #info-modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: var(--bg-panel); 
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-strong); 
            padding: 24px; 
            z-index: 100; 
            border-radius: var(--radius-lg); 
            min-width: 360px; 
            max-width: 480px; 
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.8); 
        }
        
        #info-modal h2 { 
            margin: 0 0 16px 0; 
            border-bottom: 1px solid var(--border-subtle); 
            padding-bottom: 12px; 
            color: var(--text-main); 
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }
        
        .btn-close-modal { 
            padding: 10px; 
            background: var(--bg-surface); 
            color: var(--text-main); 
            border: 1px solid var(--border-subtle); 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            font-size: 0.85rem; 
            margin-top: 16px; 
            transition: all 0.2s;
            font-family: var(--font-ui);
        }
        .btn-close-modal:hover { 
            background: var(--bg-surface-hover); 
            border-color: var(--text-muted);
        }
        
        .info-section { margin-bottom: 16px; }
        .info-label { 
            font-weight: 600; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 0.05em;
            display: block; 
            margin-bottom: 8px; 
            border-bottom: 1px solid var(--border-subtle); 
            padding-bottom: 4px;
        }
        
        ul.boost-list, ul.error-list, ul.rules-list { 
            margin: 8px 0; 
            padding-left: 20px; 
            font-size: 0.8rem;
            line-height: 1.6;
        }
        ul.boost-list { color: var(--status-valid); }
        ul.error-list { color: var(--status-invalid); font-weight: 600; }
        ul.rules-list { color: var(--text-main); }
        ul.rules-list li { margin-bottom: 6px; }
        
        .status-tag { 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.65rem; 
            font-weight: 700; 
            margin-left: 6px; 
            letter-spacing: 0.02em;
        }
        .tag-ok { background: rgba(16, 185, 129, 0.2); color: var(--status-valid); border: 1px solid rgba(16, 185, 129, 0.3); }
        .tag-fail { background: rgba(239, 68, 68, 0.2); color: var(--status-invalid); border: 1px solid rgba(239, 68, 68, 0.3); }

        .icon { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 1200px) {
            .top-layout,
            .bottom-layout {
                grid-template-columns: 1fr;
            }

            .stretch-textarea {
                min-height: 180px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Trifecta Pattern Editor</h1>
    </header>

    <div class="main-container">
        <!-- TOP ROW -->
        <div class="top-layout">
            <!-- TOP LEFT: Import -->
            <div class="panel">
                <h3 class="panel-title">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Import Array
                </h3>
                <div style="display: flex; gap: 8px; font-size: 0.85rem; color: var(--text-muted); align-items: center; justify-content: space-between;">
                    <span>Repeat Pattern:</span>
                    <div style="display: flex; align-items: center; gap: 6px;">W: <input type="number" id="import-stack-w" value="1" min="1" class="num-input"></div>
                    <div style="display: flex; align-items: center; gap: 6px;">H: <input type="number" id="import-stack-h" value="2" min="1" class="num-input"></div>
                </div>
                <textarea id="pattern-input" class="stretch-textarea" placeholder="Paste your Python array here..."></textarea>
                <button class="btn-load" onclick="loadPatternFromText()">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    Load Array
                </button>
            </div>

            <!-- TOP CENTER: Legend + Score + Grid Config -->
            <div class="panel">
                <h3 class="panel-title">
                   <svg class="icon" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                   Legend
                </h3>
                <div class="legend-panel" id="legend"></div>

              <hr>

              <h3 class="panel-title">
                  <svg class="icon" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                  Grid Config
              </h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                  <div class="input-group">W: <input type="number" id="grid-w" value="72" min="1" class="num-input"></div>
                  <div class="input-group">H: <input type="number" id="grid-h" value="18" min="1" class="num-input"></div>
                  <div class="input-group" style="grid-column: span 2;">Roads every X rows (0=None): <input type="number" id="road-int" value="9" min="0" class="num-input" style="width: 60px;"></div>
                  <button class="btn-load" style="grid-column: span 2;" onclick="applyGridSettings()">
                      <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                      Apply New Grid
                  </button>
              </div>

              <div class="score-board" id="score-board">
                  <span>Average Score</span>
                  <span id="score">0.0000</span>
              </div>
            </div>
            
            <!-- TOP RIGHT: Export -->
            <div class="panel">
                <h3 class="panel-title">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Export
                </h3>
                <div style="display: flex; gap: 8px; font-size: 0.85rem; color: var(--text-muted); align-items: center; justify-content: space-between; margin-bottom: 4px;">
                    <span>Repeat Pattern:</span>
                    <div style="display: flex; align-items: center; gap: 6px;">W: <input type="number" id="export-stack-w" value="1" min="1" class="num-input"></div>
                    <div style="display: flex; align-items: center; gap: 6px;">H: <input type="number" id="export-stack-h" value="1" min="1" class="num-input"></div>
                </div>
                <textarea id="pattern-output" class="stretch-textarea" placeholder="Exported pattern will appear here..." readonly></textarea>
                <button class="btn-export" onclick="exportPatternToText()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Export Pattern
                </button>
            </div>
        </div>

        <!-- BOTTOM ROW -->
        <div class="bottom-layout">
            <!-- BOTTOM LEFT: Utilities + Toggles -->
            <div class="panel">
                <h3 class="panel-title">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                    Utilities
                </h3>
                <div class="utils-grid">
                    <button class="tool-btn history-btn" onclick="undo()" title="Undo (Ctrl+Z)">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>
                        Undo
                    </button>
                    <button class="tool-btn history-btn" onclick="redo()" title="Redo (Ctrl+Y)">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"></polyline><path d="M4 20v-7a4 4 0 0 1 4-4h12"></path></svg>
                        Redo
                    </button>
                    <button class="tool-btn action-btn active" id="tool-move" onclick="setTool('move')" style="grid-column: span 2;">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="19 9 22 12 19 15"></polyline><polyline points="9 19 12 22 15 19"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
                        Move & Swap
                    </button>
                    <button class="tool-btn info-btn" id="tool-info" onclick="setTool('info')" title="Click on a piece to see its details">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        Info
                    </button>
                    <button class="tool-btn delete-btn" id="tool-delete" onclick="setTool('delete')">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Delete
                    </button>
                </div>

                <hr>

                <div class="toggles">
                    <label class="toggle-row" title="Ignore rules, allow overwriting and placing anywhere.">
                        <input type="checkbox" id="toggle-god"> God Mode
                    </label>
                    <label class="toggle-row" title="Flash red borders on pieces that violate any restrictions.">
                        <input type="checkbox" id="toggle-check" checked onchange="updateRender()"> Check Rules
                    </label>
                    <label class="toggle-row" title="Flash green borders on pieces with active synergies.">
                        <input type="checkbox" id="toggle-upgrades" checked onchange="updateRender()"> Check Synergies
                    </label>
                </div>
            </div>

            <!-- BOTTOM CENTER: Pattern -->
            <div class="center-workspace">
                <div class="error-box" id="error-msg"></div>
                <div id="grid-container">
                    <div class="grid" id="grid"></div>
                </div>
            </div>

            <!-- BOTTOM RIGHT: Buildings -->
            <div class="panel">
                <h3 class="panel-title">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Buildings
                </h3>
                <div id="building-toolbar" class="buildings-grid"></div>
            </div>
        </div>
    </div>

    <div id="info-overlay" onclick="closeInfo()"></div>
    <div id="info-modal">
        <h2 id="info-title">Info</h2>
        <div id="info-body"></div>
        <button class="btn-close-modal" onclick="closeInfo()">Close Panel</button>
    </div>

<script>
    let TPW = 72, TPH = 18, roadInterval = 9;
    let GRID_SIZE = TPW * TPH;

    const NAMES = {'CS':'Seed Road', 'C':'Normal Road', '1':'Field','2':'Scarecrow','3':'Farm House','4':'Tenants','5':"Landlord's",'6':'Silo','7':'Orchard','8':'Farm Shed','9':'Fruit Processor','10':'Food Plant','I8':'Warehouses'};
    const COLORS = {'CS':'#555', 'C':'gray', '1':'#00cc00','2':'lime','3':'yellow','4':'#9933cc','5':'red','6':'#0066ff','7':'pink','8':'teal','I8':'cyan','9':'olive','10':'silver'};

    const TYPES = {
        'CS': { size: [1, 1], prod: 0, rules: [], self_imp: [] },
        'C':  { size: [1, 1], prod: 0, rules: [], self_imp: [] },
        '1':  { size: [1, 1], prod: 14, rules: [{r: 5, t: 'C', min: 1}], self_imp: [{cond: {t: '2', min: 1, r: 2}, prod: 16}] },
        '2':  { size: [1, 1], prod: 0, rules: [{r: 5, t: 'C', min: 1}], self_imp: [] },
        '3':  { size: [1, 1], prod: 100, rules: [{r: 5, t: '3', max: 0}, {r: 3, t: '1', min: 12}, {r: 3, t: 'C', min: 1}], self_imp: [] },
        '4':  { size: [1, 1], prod: 50, rules: [{r: 1, t: '4', max: 5}, {r: 1, t: '1', min: 3}], self_imp: [] },
        '5':  { size: [2, 2], prod: 200, rules: [{r: 8, t: '5', max: 0}, {r: 5, t: '4', min: 4}], self_imp: [] },
        '6':  { size: [2, 2], prod: 200, rules: [{r: 6, t: '6', max: 0}, {r: 6, t: '3', min: 2}, {r: 3, t: 'C', min: 1}], self_imp: [{cond: {t: 'I8', min: 6, r: 4}, prod: 400}] },
        '7':  { size: [1, 1], prod: 32, rules: [{r: 6, t: '8', max: 0}, {r: 6, t: 'I8', max: 0}, {r: 6, t: '3', min: 1}, {r: 5, t: 'C', min: 1}], self_imp: [] },
        '8':  { size: [2, 2], prod: 700, rules: [{r: 6, t: '8', max: 0}, {r: 4, t: '1', min: 20}, {r: 1, t: 'C', min: 1}], self_imp: [] },
        'I8': { size: [1, 1], prod: 0, rules: [{r: 3, t: 'C', min: 1}], self_imp: [] },
        '9':  { size: [2, 2], prod: 1800, rules: [{r: 6, t: '9', max: 0}, {r: 6, t: '7', min: 50}, {r: 3, t: 'C', min: 1}], self_imp: [] },
        '10': { size: [3, 3], prod: 2000, rules: [{r: 6, t: '10', max: 0}, {r: 8, t: '8', min: 3}, {r: 3, t: 'C', min: 1}], self_imp: [] }
    };

    let grid = [];
    let currentTool = 'move';
    let movingTile = null;
    let historyUndo = [];
    let historyRedo = [];

    let cachedValidation = null;
    let isDragging = false;
    let dragStart = null;
    let dragEnd = null;

    function saveState(customGrid = null) {
        historyUndo.push(customGrid ? customGrid : cloneGrid());
        if (historyUndo.length > 50) historyUndo.shift(); 
        historyRedo = []; 
    }

    function undo() {
        if (historyUndo.length === 0) return;
        historyRedo.push(cloneGrid());
        grid = historyUndo.pop();
        movingTile = null;
        updateRender(true);
        showError("Action undone", true);
    }

    function redo() {
        if (historyRedo.length === 0) return;
        historyUndo.push(cloneGrid());
        grid = historyRedo.pop();
        movingTile = null;
        updateRender(true);
        showError("Action redone", true);
    }

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
        if (e.ctrlKey && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
    });

    window.addEventListener('mouseup', (e) => {
        if (e.button !== 0) return;
        if (isDragging) {
            isDragging = false;
            applyDragSelection();
        }
    });

    function mod(n, m) { return ((n % m) + m) % m; }
    function isSeedColumn(c) { return c === 0; }
    function inBounds(r, c) { return r >= 0 && r < TPH && c >= 0 && c < TPW; }

    function getFirstViolationMessage(validation, fallback = "The action violates one or more rules.") {
        if (validation.violations && validation.violations.length > 0) return validation.violations[0].msg;
        return fallback;
    }

    function applyGridSettings() {
        TPW = parseInt(document.getElementById('grid-w').value) || 72;
        TPH = parseInt(document.getElementById('grid-h').value) || 18;
        roadInterval = parseInt(document.getElementById('road-int').value) || 0;
        GRID_SIZE = TPW * TPH;
        
        grid = Array.from({ length: TPH }, () => Array(TPW).fill(null));
        
        if (roadInterval > 0) {
            for (let r = 0; r < TPH; r += roadInterval) {
                if (TPW > 0) forceAddTile(grid, r, 0, 'CS');
                for (let c = 1; c < TPW; c++) forceAddTile(grid, r, c, 'C');
            }
        }
        
        historyUndo = [];
        historyRedo = [];
        saveState();
        rebuildGridUI();
    }

    function rebuildGridUI() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${TPW}, 20px)`;
        gridEl.style.gridTemplateRows = `repeat(${TPH}, 20px)`;

        for (let r = 0; r < TPH; r++) {
            for (let c = 0; c < TPW; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c_${r}_${c}`;
                
                cell.onmousedown = (e) => {
                    if (e.button !== 0) return; 
                    e.preventDefault(); 
                    showError("");
                    if (currentTool === 'info' || currentTool === 'move') {
                        handleCellClick(r, c);
                    } else {
                        let godMode = document.getElementById('toggle-god').checked;
                        if (!godMode && (currentTool === 'CS' || currentTool === 'C')) {
                            showError(currentTool === 'CS' ? "Seed Roads cannot be placed manually outside God Mode." : "Normal roads cannot be placed manually outside God Mode.");
                            return;
                        }
                        isDragging = true;
                        dragStart = {r, c};
                        dragEnd = {r, c};
                        drawPreview();
                    }
                };
                
                cell.onmouseenter = () => {
                    if (isDragging) {
                        dragEnd = {r, c};
                        drawPreview();
                    }
                };

                gridEl.appendChild(cell);
            }
        }
        updateRender(true);
    }

    function initUI() {
        const tb = document.getElementById('building-toolbar');
        const legend = document.getElementById('legend');
        
        Object.keys(TYPES).forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.id = `tool-${t}`;
            btn.onclick = () => setTool(t);
            btn.innerHTML = `<div class="color-swatch" style="background:${COLORS[t]}"></div> ${NAMES[t]} (${t}) <span style="margin-left:auto; opacity:0.5;">${TYPES[t].size[0]}x${TYPES[t].size[1]}</span>`;
            tb.appendChild(btn);

            const legItem = document.createElement('div');
            legItem.className = 'legend-item';
            legItem.onclick = () => showTypeInfo(t);
            legItem.title = "Click for details";
            legItem.innerHTML = `<div class="color-swatch" style="background:${COLORS[t]}"></div> <b>${t}</b>: ${NAMES[t]}`;
            legend.appendChild(legItem);
        });

        applyGridSettings();
    }

    function showTypeInfo(type) {
        const tDef = TYPES[type];
        const name = NAMES[type];
        let html = `<div class="info-section">`;
        html += `<p><strong>Name:</strong> <span style="color:${COLORS[type]}">${name} (${type})</span></p>`;
        html += `<p><strong>Size:</strong> ${tDef.size[0]}x${tDef.size[1]}</p>`;
        html += `<p><strong>Base Production:</strong> ${tDef.prod}</p></div>`;

        if (tDef.rules.length > 0 || type === 'C' || type === 'CS') {
            html += `<div class="info-section"><span class="info-label">Requirements</span><ul class="rules-list">`;
            
            if (type === 'C') html += `<li>Must be connected to a Seed Road (CS) via other roads.</li>`;
            if (type === 'CS') html += `<li>Only allowed in column 1.</li>`;

            tDef.rules.forEach(r => {
                let tName = r.t === 'C' ? "Roads (C/CS)" : r.t;
                if (r.min !== undefined) html += `<li>Min <strong>${r.min}</strong> of <strong>${tName}</strong> (rad ${r.r}).</li>`;
                if (r.max !== undefined) html += `<li>Max <strong>${r.max}</strong> of <strong>${tName}</strong> (rad ${r.r}).</li>`;
            });
            html += `</ul></div>`;
        }

        if (tDef.self_imp && tDef.self_imp.length > 0) {
            html += `<div class="info-section"><span class="info-label">Synergies</span><ul class="boost-list">`;
            tDef.self_imp.forEach(imp => {
                let c = imp.cond;
                let tName = c.t === 'C' ? "Roads (C/CS)" : c.t;
                html += `<li>Boost to <strong>${imp.prod}</strong> if <strong>${c.min}+</strong> of <strong>${tName}</strong> (rad ${c.r}).</li>`;
            });
            html += `</ul></div>`;
        }
        openInfo(`Building Data: ${type}`, html);
    }

    function exportPatternToText() {
        let stackW = parseInt(document.getElementById('export-stack-w').value) || 1;
        let stackH = parseInt(document.getElementById('export-stack-h').value) || 1;
        let totalH = TPH * stackH, totalW = TPW * stackW;
        
        let output = "[\n";
        for (let r = 0; r < totalH; r++) {
            let rowStr = "    [";
            for (let c = 0; c < totalW; c++) {
                let cell = grid[r % TPH][c % TPW];
                rowStr += cell ? `'${cell.type}'` : "None";
                if (c < totalW - 1) rowStr += ", ";
            }
            output += rowStr + "]" + (r < totalH - 1 ? ",\n" : "\n");
        }
        output += "]";
        document.getElementById('pattern-output').value = output;
        showError("Pattern exported.", true);
    }

    function setTool(tool) {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tool-${tool}`).classList.add('active');
        currentTool = tool;
        movingTile = null;
        updateRender();
    }

    function showError(msg, isSuccess = false) {
        const eb = document.getElementById('error-msg');
        eb.innerText = msg;
        eb.style.color = isSuccess ? 'var(--status-valid)' : 'var(--status-invalid)';
    }

    function loadPatternFromText() {
        let text = document.getElementById('pattern-input').value;
        let start = text.indexOf('['), end = text.lastIndexOf(']');
        if (start === -1 || end === -1 || end < start) return showError("Invalid format.");

        let arrayText = text.substring(start, end + 1).replace(/#.*$/gm, '').replace(/\bNone\b/g, 'null').replace(/'/g, '"').replace(/,\s*]/g, ']');

        try {
            let parsedArr = JSON.parse(arrayText);
            let stackW = parseInt(document.getElementById('import-stack-w').value) || 1;
            let stackH = parseInt(document.getElementById('import-stack-h').value) || 1;
            
            let arrH = parsedArr.length, arrW = arrH > 0 ? parsedArr[0].length : 0;
            if (arrW === 0 || arrH === 0) return showError("Empty array.");
            
            document.getElementById('grid-w').value = arrW * stackW;
            document.getElementById('grid-h').value = arrH * stackH;
            document.getElementById('road-int').value = 0;
            
            applyGridSettings();
            applyPatternArray(parsedArr, stackW, stackH);
            showError("Array loaded successfully.", true);
        } catch (e) {
            showError("Parsing error when importing the array.");
        }
    }

    function applyPatternArray(arr, stackW, stackH) {
        let arrH = arr.length, arrW = arr[0].length, prevGrid = cloneGrid();
        
        for (let ds = 0; ds < stackH; ds++) {
            for (let ls = 0; ls < stackW; ls++) {
                let r_o = ds * arrH, c_o = ls * arrW;
                for (let r_idx = 0; r_idx < arrH; r_idx++) {
                    for (let c_idx = 0; c_idx < arrW; c_idx++) {
                        let gr = r_o + r_idx, gc = c_o + c_idx;
                        if (gr < TPH && gc < TPW) {
                            let t = arr[r_idx][c_idx];
                            if (t === 'CS' && !isSeedColumn(gc)) t = 'C';
                            if (t && TYPES[t] && grid[gr][gc] === null) forceAddTile(grid, gr, gc, t);
                        }
                    }
                }
            }
        }
        saveState(prevGrid);
        updateRender(true);
    }

    function getBlockNeighbors(anchorR, anchorC, h, w, radius, distType = 'chebyshev') {
        let neighbors = [];
        let isBlock = Array.from({length: TPH}, () => Array(TPW).fill(false));
        for (let di = 0; di < h; di++) for (let dj = 0; dj < w; dj++) isBlock[mod(anchorR + di, TPH)][mod(anchorC + dj, TPW)] = true;
        let visited = Array.from({length: TPH}, () => Array(TPW).fill(false));
        for (let di = 0; di < h; di++) {
            for (let dj = 0; dj < w; dj++) {
                let ci = mod(anchorR + di, TPH), cj = mod(anchorC + dj, TPW);
                for (let ri = -radius; ri <= radius; ri++) {
                    for (let rj = -radius; rj <= radius; rj++) {
                        if (ri === 0 && rj === 0) continue;
                        if (distType === 'manhattan' && (Math.abs(ri) + Math.abs(rj) > radius)) continue;
                        let ni = mod(ci + ri, TPH), nj = mod(cj + rj, TPW);
                        if (!isBlock[ni][nj] && !visited[ni][nj]) {
                            visited[ni][nj] = true;
                            neighbors.push({r: ni, c: nj});
                        }
                    }
                }
            }
        }
        return neighbors;
    }

    function getGridValidation(testGrid) {
        let violations = [], synergiesActive = [], totalProd = 0;
        let roadConnected = Array.from({length: TPH}, () => Array(TPW).fill(false)), seedQueue = [];

        for (let r = 0; r < TPH; r++) {
            for (let c = 0; c < TPW; c++) {
                let cell = testGrid[r][c];
                if (cell && cell.type === 'CS' && cell.anchorR === r && cell.anchorC === c && isSeedColumn(c)) {
                    roadConnected[r][c] = true;
                    seedQueue.push({r, c});
                }
            }
        }

        let dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        while (seedQueue.length > 0) {
            let curr = seedQueue.shift();
            for (let d of dirs) {
                let nr = curr.r + d[0], nc = curr.c + d[1];
                if (!inBounds(nr, nc)) continue;
                if (testGrid[nr][nc] && testGrid[nr][nc].type === 'C' && !roadConnected[nr][nc]) {
                    roadConnected[nr][nc] = true;
                    seedQueue.push({r: nr, c: nc});
                }
            }
        }

        let checkedAnchors = new Set();
        for (let r = 0; r < TPH; r++) {
            for (let c = 0; c < TPW; c++) {
                const cell = testGrid[r][c];
                if (!cell) continue;

                let key = `${cell.anchorR},${cell.anchorC}`;
                if (checkedAnchors.has(key)) continue;
                checkedAnchors.add(key);

                let typeDef = TYPES[cell.type];
                let th = typeDef.size[0], tw = typeDef.size[1];
                let ar = cell.anchorR, ac = cell.anchorC, cellValid = true, errorMsg = "";

                if (cell.type === 'CS' && !isSeedColumn(ac)) {
                    cellValid = false; errorMsg = "Seed Road (CS) can only be in column 1.";
                } else if (cell.type === 'C' && !roadConnected[ar][ac]) {
                    cellValid = false; errorMsg = "Road not connected to a Seed Road (CS) from column 1.";
                } else {
                    for (let rule of typeDef.rules) {
                        let ns = getBlockNeighbors(ar, ac, th, tw, rule.r, rule.dist), uniqueBuildings = new Set();
                        ns.forEach(n => {
                            let neighbor = testGrid[n.r][n.c];
                            if (neighbor && (neighbor.type === rule.t || (rule.t === 'C' && neighbor.type === 'CS'))) 
                                uniqueBuildings.add(`${neighbor.anchorR},${neighbor.anchorC}`);
                        });
                        if (rule.min !== undefined && uniqueBuildings.size < rule.min) { cellValid = false; errorMsg = `${cell.type} needs minimum ${rule.min} of ${rule.t}`; break; }
                        if (rule.max !== undefined && uniqueBuildings.size > rule.max) { cellValid = false; errorMsg = `${cell.type} allows maximum ${rule.max} of ${rule.t}`; break; }
                    }
                }
                
                if (!cellValid) {
                    for (let di = 0; di < th; di++) for (let dj = 0; dj < tw; dj++) violations.push({r: mod(ar + di, TPH), c: mod(ac + dj, TPW), msg: errorMsg});
                }
                
                let cellProd = typeDef.prod, isUpgraded = false;
                for (let imp of typeDef.self_imp) {
                    let ns = getBlockNeighbors(ar, ac, th, tw, imp.cond.r, imp.cond.dist), uniqueBoosters = new Set();
                    ns.forEach(n => {
                        let neighbor = testGrid[n.r][n.c];
                        if (neighbor && (neighbor.type === imp.cond.t || (imp.cond.t === 'C' && neighbor.type === 'CS')))
                            uniqueBoosters.add(`${neighbor.anchorR},${neighbor.anchorC}`);
                    });
                    if (uniqueBoosters.size >= imp.cond.min) { cellProd = imp.prod; isUpgraded = true; }
                }

                if (isUpgraded) {
                    for (let di = 0; di < th; di++) for (let dj = 0; dj < tw; dj++) synergiesActive.push({r: mod(ar + di, TPH), c: mod(ac + dj, TPW)});
                }
                totalProd += cellProd;
            }
        }
        return { valid: violations.length === 0, violations, upgrades: synergiesActive, score: totalProd / GRID_SIZE };
    }

    function cloneGrid() { return grid.map(row => row.map(cell => cell ? {...cell} : null)); }

    function removeTile(testGrid, r, c, force = false) {
        let cell = testGrid[r][c];
        if (!cell || ((cell.type === 'C' || cell.type === 'CS') && !force)) return false; 
        let ar = cell.anchorR, ac = cell.anchorC, tDef = TYPES[cell.type];
        for (let di = 0; di < tDef.size[0]; di++) for (let dj = 0; dj < tDef.size[1]; dj++) testGrid[mod(ar + di, TPH)][mod(ac + dj, TPW)] = null;
        return true;
    }

    function addTileSafe(testGrid, ar, ac, type) {
        let tDef = TYPES[type];
        for (let di = 0; di < tDef.size[0]; di++) for (let dj = 0; dj < tDef.size[1]; dj++) if (testGrid[mod(ar + di, TPH)][mod(ac + dj, TPW)] !== null) return false;
        for (let di = 0; di < tDef.size[0]; di++) for (let dj = 0; dj < tDef.size[1]; dj++) testGrid[mod(ar + di, TPH)][mod(ac + dj, TPW)] = {type: type, anchorR: ar, anchorC: ac};
        return true;
    }

    function forceAddTile(testGrid, ar, ac, type) {
        let tDef = TYPES[type];
        for (let di = 0; di < tDef.size[0]; di++) {
            for (let dj = 0; dj < tDef.size[1]; dj++) {
                let nr = mod(ar + di, TPH), nc = mod(ac + dj, TPW);
                if (testGrid[nr][nc]) removeTile(testGrid, testGrid[nr][nc].anchorR, testGrid[nr][nc].anchorC, true);
            }
        }
        for (let di = 0; di < tDef.size[0]; di++) for (let dj = 0; dj < tDef.size[1]; dj++) testGrid[mod(ar + di, TPH)][mod(ac + dj, TPW)] = {type: type, anchorR: ar, anchorC: ac};
        return true;
    }

    function openInfo(title, html) {
        document.getElementById('info-title').innerText = title;
        document.getElementById('info-body').innerHTML = html;
        document.getElementById('info-overlay').style.display = 'block';
        document.getElementById('info-modal').style.display = 'block';
    }

    function closeInfo() {
        document.getElementById('info-overlay').style.display = 'none';
        document.getElementById('info-modal').style.display = 'none';
    }

    function handleCellClick(r, c) {
        let godMode = document.getElementById('toggle-god').checked;
        let prevGrid = cloneGrid(), newGrid = cloneGrid();

        if (currentTool === 'info') {
            let cell = grid[r][c];
            if (!cell) return;
            let tDef = TYPES[cell.type], val = getGridValidation(grid), currentProd = tDef.prod, rulesSummary = "", boostSummary = "";

            if (cell.type === 'C') {
                let connected = !val.violations.some(v => grid[v.r]?.[v.c]?.anchorR === cell.anchorR && grid[v.r]?.[v.c]?.anchorC === cell.anchorC);
                rulesSummary += `<li>Connected to Seed Road (CS): <span class="status-tag tag-${connected ? "ok" : "fail"}">${connected ? "OK" : "FAIL"}</span></li>`;
            }

            if (cell.type === 'CS') {
                let goodCol = cell.anchorC === 0;
                rulesSummary += `<li>In column 1: <span class="status-tag tag-${goodCol ? "ok" : "fail"}">${goodCol ? "OK" : "FAIL"}</span></li>`;
            }

            tDef.rules.forEach(rule => {
                let ns = getBlockNeighbors(cell.anchorR, cell.anchorC, tDef.size[0], tDef.size[1], rule.r, rule.dist), uniqueSet = new Set();
                ns.forEach(n => {
                    let neighbor = grid[n.r][n.c];
                    if (neighbor && (neighbor.type === rule.t || (rule.t === 'C' && neighbor.type === 'CS'))) uniqueSet.add(`${neighbor.anchorR},${neighbor.anchorC}`);
                });
                let count = uniqueSet.size, status = "ok";
                if ((rule.min !== undefined && count < rule.min) || (rule.max !== undefined && count > rule.max)) status = "fail";
                let tName = rule.t === 'C' ? "Roads (C/CS)" : `${NAMES[rule.t]} (${rule.t})`;
                rulesSummary += `<li>${rule.min !== undefined ? `Min ${rule.min}` : `Max ${rule.max}`} ${tName}: <strong>${count}</strong> found. <span class="status-tag tag-${status}">${status.toUpperCase()}</span></li>`;
            });

            tDef.self_imp.forEach(imp => {
                let ns = getBlockNeighbors(cell.anchorR, cell.anchorC, tDef.size[0], tDef.size[1], imp.cond.r, imp.cond.dist), uniqueSet = new Set();
                ns.forEach(n => {
                    let neighbor = grid[n.r][n.c];
                    if (neighbor && (neighbor.type === imp.cond.t || (imp.cond.t === 'C' && neighbor.type === 'CS'))) uniqueSet.add(`${neighbor.anchorR},${neighbor.anchorC}`);
                });
                let active = uniqueSet.size >= imp.cond.min;
                if (active) currentProd = imp.prod;
                let tName = imp.cond.t === 'C' ? "Roads (C/CS)" : NAMES[imp.cond.t];
                boostSummary += `<li>Boost to ${imp.prod} if ${imp.cond.min}+ ${tName}: <strong>${uniqueSet.size}/${imp.cond.min}</strong> <span class="status-tag tag-${active ? 'ok' : 'fail'}">${active ? 'ACTIVE' : 'INACTIVE'}</span></li>`;
            });

            openInfo(`Building Analysis`, `
                <div class="info-section"><span class="info-label">Current Status</span><p>Building: <strong>${NAMES[cell.type]} (${cell.type})</strong></p><p>Production: <span style="color:var(--status-valid); font-size:1.1rem; font-weight:700;">${currentProd}</span> (Base: ${tDef.prod})</p></div>
                <div class="info-section"><span class="info-label">Requirement Check</span><ul class="rules-list">${rulesSummary || '<li>No requirements.</li>'}</ul></div>
                <div class="info-section"><span class="info-label">Synergy Progress</span><ul class="boost-list">${boostSummary || '<li>No synergies available.</li>'}</ul></div>
            `);
            return;
        }

        if (currentTool === 'move') {
            let cellTarget = grid[r][c];
            if (movingTile === null) {
                if (!cellTarget) return showError("Select a block to move first.");
                if (!godMode && (cellTarget.type === 'C' || cellTarget.type === 'CS')) return showError("Roads cannot be moved outside God Mode.");
                movingTile = { type: cellTarget.type, ar: cellTarget.anchorR, ac: cellTarget.anchorC };
            } else {
                if (!godMode && movingTile.type === 'CS' && !isSeedColumn(c)) { movingTile = null; return showError("Seed Road (CS) can only be placed in column 1."); }
                
                if (cellTarget) {
                    let tInfo = { type: cellTarget.type, ar: cellTarget.anchorR, ac: cellTarget.anchorC };
                    removeTile(newGrid, movingTile.ar, movingTile.ac, true);
                    removeTile(newGrid, tInfo.ar, tInfo.ac, true);

                    if (!addTileSafe(newGrid, tInfo.ar, tInfo.ac, movingTile.type) || !addTileSafe(newGrid, movingTile.ar, movingTile.ac, tInfo.type)) {
                        movingTile = null; return showError("Cannot swap these blocks due to size/space constraints.");
                    }
                    let check = getGridValidation(newGrid);
                    if (godMode || check.valid) { saveState(prevGrid); grid = newGrid; cachedValidation = check; } else showError(getFirstViolationMessage(check, "That swap violates rules."));
                } else {
                    removeTile(newGrid, movingTile.ar, movingTile.ac, true);
                    if (!addTileSafe(newGrid, r, c, movingTile.type)) { movingTile = null; return showError("Not enough space to move that block there."); }
                    
                    let check = getGridValidation(newGrid);
                    if (godMode || check.valid) { saveState(prevGrid); grid = newGrid; cachedValidation = check; } else showError(getFirstViolationMessage(check, "That move violates rules."));
                }
                movingTile = null;
            }
            updateRender(false);
        }
    }

    function applyDragSelection() {
        if (!dragStart || !dragEnd) return;

        let minR = Math.min(dragStart.r, dragEnd.r), maxR = Math.max(dragStart.r, dragEnd.r);
        let minC = Math.min(dragStart.c, dragEnd.c), maxC = Math.max(dragStart.c, dragEnd.c);

        let godMode = document.getElementById('toggle-god').checked, prevGrid = cloneGrid(), newGrid = cloneGrid();
        let changesMade = false, hasError = false, errMsg = "";

        if (currentTool === 'delete') {
            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    if (newGrid[r][c]) {
                        if (removeTile(newGrid, r, c, godMode)) changesMade = true;
                        else { hasError = true; if (!errMsg) errMsg = "Some blocks could not be deleted (due to God Mode or type constraints)."; }
                    }
                }
            }
        } else {
            let tDef = TYPES[currentTool], h = tDef.size[0], w = tDef.size[1];
            for (let r = minR; r <= maxR; r += h) {
                for (let c = minC; c <= maxC; c += w) {
                    if (!godMode && currentTool === 'CS' && !isSeedColumn(c)) { hasError = true; if (!errMsg) errMsg = "Seed Road (CS) can only be placed in column 1."; continue; }
                    
                    if (godMode ? forceAddTile(newGrid, r, c, currentTool) : addTileSafe(newGrid, r, c, currentTool)) changesMade = true;
                    else { hasError = true; if (!errMsg) errMsg = "Cannot place in some spaces (occupied or incompatible size)."; }
                }
            }
        }

        if (changesMade) {
            let check = getGridValidation(newGrid);
            if (godMode || check.valid) {
                saveState(prevGrid); grid = newGrid; cachedValidation = check;
                if (hasError) showError(errMsg); else showError("");
            } else showError(getFirstViolationMessage(check, "Mass placement violates rules. No changes applied."));
        } else if (hasError) showError(errMsg);

        dragStart = null; dragEnd = null;
        updateRender(false);
    }

    function drawPreview() {
        updateRender(); 

        if (!isDragging || currentTool === 'info' || currentTool === 'move') return;

        let minR = Math.min(dragStart.r, dragEnd.r), maxR = Math.max(dragStart.r, dragEnd.r);
        let minC = Math.min(dragStart.c, dragEnd.c), maxC = Math.max(dragStart.c, dragEnd.c);

        if (currentTool === 'delete') {
            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    let el = document.getElementById(`c_${r}_${c}`);
                    if (el) { el.style.backgroundColor = 'var(--status-invalid)'; el.style.opacity = '0.75'; }
                }
            }
        } else {
            let h = TYPES[currentTool].size[0], w = TYPES[currentTool].size[1], color = COLORS[currentTool];
            for (let r = minR; r <= maxR; r += h) {
                for (let c = minC; c <= maxC; c += w) {
                    for (let di = 0; di < h; di++) {
                        for (let dj = 0; dj < w; dj++) {
                            let el = document.getElementById(`c_${mod(r + di, TPH)}_${mod(c + dj, TPW)}`);
                            if (el) { el.style.backgroundColor = color; el.style.opacity = '0.75'; }
                        }
                    }
                }
            }
        }
    }

    function updateRender(forceValidate = false) {
        if (forceValidate || !cachedValidation) cachedValidation = getGridValidation(grid);
        let validation = cachedValidation;

        let showViolations = document.getElementById('toggle-check').checked, showUpgrades = document.getElementById('toggle-upgrades').checked;
        let vMap = new Map(), uMap = new Set();
        
        if (showViolations) validation.violations.forEach(v => vMap.set(`${v.r}_${v.c}`, v.msg));
        if (showUpgrades) validation.upgrades.forEach(u => uMap.add(`${u.r}_${u.c}`));

        document.getElementById('score').innerText = validation.score.toFixed(4);
        document.getElementById('score-board').className = validation.valid ? "score-board valid" : "score-board invalid";
        
        for (let r = 0; r < TPH; r++) {
            for (let c = 0; c < TPW; c++) {
                let el = document.getElementById(`c_${r}_${c}`), cellData = grid[r][c];
                el.style.border = ""; el.style.opacity = ""; 
                el.classList.remove('violation'); el.classList.remove('synergy-active');
                
                if (cellData) {
                    el.style.backgroundColor = COLORS[cellData.type];
                    el.innerText = (r === cellData.anchorR && c === cellData.anchorC) ? cellData.type : "";
                    el.style.color = ['3','4','1','2','8','I8','10'].includes(cellData.type) ? "#09090b" : "#f4f4f5";
                    if (movingTile && cellData.anchorR === movingTile.ar && cellData.anchorC === movingTile.ac) el.style.border = "2px dashed var(--accent-primary)";
                } else { 
                    el.style.backgroundColor = "var(--bg-surface-hover)"; el.innerText = ""; 
                }
                
                if (vMap.has(`${r}_${c}`)) el.classList.add('violation');
                if (uMap.has(`${r}_${c}`)) el.classList.add('synergy-active');
            }
        }
    }
    
    initUI();
</script>
</body>
</html>
